name: TeamsAPI
version: ${project.version}
main: com.skyblockexp.teamsapi.TeamsApiPlugin
api-version: '1.16'
folia-supported: true
description: >
  Universal Teams API — a timeless bridge between team plugins and the plugins that
  depend on them. Install this plugin alongside any TeamsAPI-compatible team plugin.
author: ez-plugins
website: https://github.com/ez-plugins/teams-api

commands:
  teamsapi:
    description: TeamsAPI admin command.
    usage: /teamsapi [version|status|info|power [status|buy <amount>]]
    permission: teamsapi.use

permissions:
  teamsapi.admin:
    description: Access to TeamsAPI admin commands.
    default: op
  teamsapi.use:
    description: Access to basic /teamsapi commands (version, status, help).
    default: true
  teamsapi.status:
    description: Access to /teamsapi status — shows active provider and services.
    default: true
  teamsapi.power:
    description: Access to /teamsapi power subcommands (status and buy).
    default: op
  teamsapi.power.buy:
    description: Access to /teamsapi power buy — purchase power with Vault economy.
    default: op

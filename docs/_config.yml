title: TeamsAPI
description: >-
  Universal Teams API for Minecraft — a timeless bridge between team plugins
  and the plugins that depend on them. Vault-style provider interface for Paper 26.1+.

url: "https://ez-plugins.github.io"
baseurl: "/teams-api"

# ── Appearance ────────────────────────────────────────────────────────────────
color_scheme: teams-api
heading_anchors: true

# ── Header links ──────────────────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/ez-plugins/teams-api"
  "JitPack":
    - "https://jitpack.io/#ez-plugins/teams-api"

aux_links_new_tab: true

# ── Navigation ────────────────────────────────────────────────────────────────
nav_sort: case_insensitive
nav_external_links:
  - title: Changelog
    url: "https://github.com/ez-plugins/teams-api/releases"
    hide_icon: false

# ── Search ────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level:        2
  previews:             3
  preview_words_before: 5
  preview_words_after:  10
  tokenizer_separator:  /[\s/]+/

# ── Footer ────────────────────────────────────────────────────────────────────
back_to_top:      true
back_to_top_text: "Back to top"

footer_content: >-
  Copyright &copy; 2026 Gyvex / ez-plugins.
  Distributed under the
  <a href="https://github.com/ez-plugins/teams-api/blob/main/LICENSE">MIT License</a>.

# ── Kramdown ──────────────────────────────────────────────────────────────────
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# ── Plugins ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ── Build exclusions ──────────────────────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock

remote_theme: just-the-docs/just-the-docs

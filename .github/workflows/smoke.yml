name: Smoke Tests

# Verify that the plugin JAR starts cleanly on Paper, Folia, and Spigot.
# The test passes when the server reaches its "Done" state without TeamsAPI
# logging an enable-failure or a JVM API-incompatibility error.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  MC_VERSION: "1.21.11"

jobs:

  # ── 1. Build the shaded plugin JAR once with JDK 25 ─────────────────────────
  build:
    name: Build plugin JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Purge stale JitPack artifacts from Maven cache
        run: rm -rf ~/.m2/repository/com/github

      - name: Build plugin (skip tests)
        run: mvn -B -ntp -DskipTests package

      - name: Stage plugin JAR
        run: |
          JAR=$(find teams-api-plugin/target -maxdepth 1 \
            -name "teams-api-plugin-*.jar" ! -name "original-*" | head -1)
          echo "Located: $JAR"
          cp "$JAR" plugin.jar

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: plugin.jar
          if-no-files-found: error

      - name: Stage BetterTeams extension JAR
        run: |
          JAR=$(find teams-api-extension-betterteams/target -maxdepth 1 \
            -name "teams-api-extension-betterteams-*.jar" | head -1)
          echo "Located: $JAR"
          cp "$JAR" betterteams-extension.jar

      - name: Upload BetterTeams extension JAR
        uses: actions/upload-artifact@v4
        with:
          name: betterteams-extension-jar
          path: betterteams-extension.jar
          if-no-files-found: error

      - name: Stage Towny extension JAR
        run: |
          JAR=$(find teams-api-extension-towny/target -maxdepth 1 \
            -name "teams-api-extension-towny-*.jar" | head -1)
          echo "Located: $JAR"
          cp "$JAR" towny-extension.jar

      - name: Upload Towny extension JAR
        uses: actions/upload-artifact@v4
        with:
          name: towny-extension-jar
          path: towny-extension.jar
          if-no-files-found: error

      - name: Stage KingdomsX extension JAR
        run: |
          JAR=$(find teams-api-extension-kingdomsx/target -maxdepth 1 \
            -name "teams-api-extension-kingdomsx-*.jar" | head -1)
          echo "Located: $JAR"
          cp "$JAR" kingdomsx-extension.jar

      - name: Upload KingdomsX extension JAR
        uses: actions/upload-artifact@v4
        with:
          name: kingdomsx-extension-jar
          path: kingdomsx-extension.jar
          if-no-files-found: error

  # ── 2. Smoke-test on each server / Java combination ──────────────────────────
  smoke:
    name: Smoke – ${{ matrix.server }} / Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - server: paper
            java: 21
          - server: paper
            java: 25
          - server: folia
            java: 21
          - server: folia
            java: 25
          - server: spigot
            java: 21
          - server: spigot
            java: 25

    steps:
      - name: Download plugin JAR
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      # ── Paper ────────────────────────────────────────────────────────────────

      - name: Download Paper ${{ env.MC_VERSION }}
        if: matrix.server == 'paper'
        run: |
          BUILD=$(curl -sf \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['builds'][-1]['build'])")
          curl -sfLo server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds/${BUILD}/downloads/paper-${{ env.MC_VERSION }}-${BUILD}.jar"
          echo "Paper build: $BUILD"

      # ── Folia ────────────────────────────────────────────────────────────────

      - name: Download Folia ${{ env.MC_VERSION }}
        if: matrix.server == 'folia'
        run: |
          BUILD=$(curl -sf \
            "https://api.papermc.io/v2/projects/folia/versions/${{ env.MC_VERSION }}/builds" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['builds'][-1]['build'])")
          curl -sfLo server.jar \
            "https://api.papermc.io/v2/projects/folia/versions/${{ env.MC_VERSION }}/builds/${BUILD}/downloads/folia-${{ env.MC_VERSION }}-${BUILD}.jar"
          echo "Folia build: $BUILD"

      # ── Spigot via BuildTools ────────────────────────────────────────────────
      # BuildTools is strict about its build JVM: always run it with Java 21
      # regardless of the matrix Java used to *run* the server.

      - name: Set up Java 21 for Spigot BuildTools
        if: matrix.server == 'spigot'
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache Spigot ${{ env.MC_VERSION }}
        if: matrix.server == 'spigot'
        id: spigot-cache
        uses: actions/cache@v4
        with:
          path: ~/spigot-jar
          key: spigot-${{ env.MC_VERSION }}-buildtools-v1

      - name: Build Spigot via BuildTools
        if: matrix.server == 'spigot' && steps.spigot-cache.outputs.cache-hit != 'true'
        timeout-minutes: 25
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "GitHub Actions CI"
          mkdir -p ~/spigot-jar buildtools
          cd buildtools
          curl -sfLo BuildTools.jar \
            "https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar"
          "$JAVA_HOME_21_X64/bin/java" -jar BuildTools.jar \
            --rev "${{ env.MC_VERSION }}" --compile SPIGOT --nogui
          cp "spigot-${{ env.MC_VERSION }}.jar" "$HOME/spigot-jar/"

      # Restore the matrix Java so the server runs on the intended JVM.
      - name: Restore JDK ${{ matrix.java }} (server runtime)
        if: matrix.server == 'spigot'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Use Spigot JAR
        if: matrix.server == 'spigot'
        run: cp "$HOME/spigot-jar/spigot-${{ env.MC_VERSION }}.jar" server.jar

      # ── Prepare server directory ─────────────────────────────────────────────

      - name: Prepare server
        run: |
          mkdir -p server/plugins
          cp server.jar server/server.jar
          cp plugin.jar server/plugins/TeamsAPI.jar
          echo "eula=true" > server/eula.txt
          {
            echo "online-mode=false"
            echo "level-type=flat"
            echo "generate-structures=false"
            echo "view-distance=2"
            echo "simulation-distance=2"
          } > server/server.properties

      # ── Smoke test ───────────────────────────────────────────────────────────

      - name: Run smoke test
        timeout-minutes: 5
        run: |
          cd server
          java -Xmx512M -Xms512M -jar server.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: ${SERVER_PID}"

          FAIL_PAT="NoSuchMethodError|NoSuchFieldError|Error enabling plugin TeamsAPI|Error occurred while enabling TeamsAPI"
          RESULT=timeout

          for i in $(seq 1 120); do
            sleep 1

            # Hard failure — API incompatibility or onEnable exception
            if grep -qE "$FAIL_PAT" server.log 2>/dev/null; then
              RESULT=fail
              break
            fi

            # Server fully started — all plugins enabled without errors
            if grep -qE "Done \([0-9.]" server.log 2>/dev/null; then
              if grep -qE "$FAIL_PAT" server.log 2>/dev/null; then
                RESULT=fail
              else
                RESULT=pass
              fi
              break
            fi

            # Enabling logged — wait 5 s for any delayed crash before declaring pass
            if grep -q "Enabling TeamsAPI" server.log 2>/dev/null; then
              sleep 5
              if grep -qE "$FAIL_PAT" server.log 2>/dev/null; then
                RESULT=fail
              else
                RESULT=pass
              fi
              break
            fi

            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              echo "Server process exited before reaching Done state."
              RESULT=fail
              break
            fi
          done

          # SIGKILL guarantees the JVM exits immediately
          kill -9 "${SERVER_PID}" 2>/dev/null || true
          wait "${SERVER_PID}" 2>/dev/null || true

          echo ""
          echo "=== Error context in server.log ==="
          grep -n -B1 -A25 -E \
            "Error occurred while enabling|Error enabling plugin|NoSuchMethodError|NoSuchFieldError" \
            server.log | head -80 || true
          echo ""
          echo "=== Last 100 lines of server.log ==="
          tail -100 server.log
          echo "====================================="
          echo ""

          if [ "$RESULT" = "pass" ]; then
            echo "PASS: TeamsAPI enabled on ${{ matrix.server }} / Java ${{ matrix.java }}"
          elif [ "$RESULT" = "fail" ]; then
            echo "FAIL: Plugin threw an error during startup"
            exit 1
          else
            echo "FAIL: Timed out — TeamsAPI never appeared in server.log within 120 s"
            exit 1
          fi

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ matrix.server }}-java${{ matrix.java }}
          path: server/server.log
          if-no-files-found: ignore

  smoke-extension-betterteams:
    name: Smoke - BetterTeams extension / Paper / Java 21
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Download TeamsAPI plugin JAR
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar

      - name: Download BetterTeams extension JAR
        uses: actions/download-artifact@v4
        with:
          name: betterteams-extension-jar

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Download Paper ${{ env.MC_VERSION }}
        run: |
          BUILD=$(curl -sf \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['builds'][-1]['build'])")
          curl -sfLo server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds/${BUILD}/downloads/paper-${{ env.MC_VERSION }}-${BUILD}.jar"
          echo "Paper build: $BUILD"

      - name: Download BetterTeams plugin JAR
        run: |
          curl -sfLo BetterTeams.jar \
            "https://jitpack.io/com/github/booksaw/BetterTeams/5.1.2/BetterTeams-5.1.2.jar"

      - name: Prepare server
        run: |
          mkdir -p server/plugins
          cp server.jar server/server.jar
          cp plugin.jar server/plugins/TeamsAPI.jar
          cp betterteams-extension.jar server/plugins/TeamsAPI-BetterTeams-Extension.jar
          cp BetterTeams.jar server/plugins/BetterTeams.jar
          echo "eula=true" > server/eula.txt
          {
            echo "online-mode=false"
            echo "level-type=flat"
            echo "generate-structures=false"
            echo "view-distance=2"
            echo "simulation-distance=2"
          } > server/server.properties

      - name: Run extension smoke test
        timeout-minutes: 6
        run: |
          cd server
          java -Xmx768M -Xms512M -jar server.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          RESULT=timeout
          FAIL_PAT="NoSuchMethodError|NoSuchFieldError|Error enabling plugin"

          for i in $(seq 1 150); do
            sleep 1
            if grep -qE "$FAIL_PAT" server.log 2>/dev/null; then
              RESULT=fail
              break
            fi
            if grep -qE "Done \([0-9.]" server.log 2>/dev/null; then
              if grep -q "Registered BetterTeams TeamsService provider" server.log 2>/dev/null; then
                RESULT=pass
              else
                RESULT=fail
              fi
              break
            fi
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              RESULT=fail
              break
            fi
          done

          kill -9 "${SERVER_PID}" 2>/dev/null || true
          wait "${SERVER_PID}" 2>/dev/null || true

          echo "=== Last 120 lines of server.log ==="
          tail -120 server.log || true

          if [ "$RESULT" = "pass" ]; then
            echo "PASS: BetterTeams extension started and registered provider."
          elif [ "$RESULT" = "fail" ]; then
            echo "FAIL: BetterTeams extension startup failed."
            exit 1
          else
            echo "FAIL: Timed out waiting for startup."
            exit 1
          fi

      - name: Upload extension server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-extension-betterteams
          path: server/server.log
          if-no-files-found: ignore

  smoke-extension-towny:
    name: Smoke - Towny extension / Paper / Java 21
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Download TeamsAPI plugin JAR
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar

      - name: Download Towny extension JAR
        uses: actions/download-artifact@v4
        with:
          name: towny-extension-jar

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Download Paper ${{ env.MC_VERSION }}
        run: |
          BUILD=$(curl -sf \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['builds'][-1]['build'])")
          curl -sfLo server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds/${BUILD}/downloads/paper-${{ env.MC_VERSION }}-${BUILD}.jar"

      - name: Download Towny plugin JAR
        run: |
          curl -sfLo Towny.jar \
            "https://repo.codemc.io/repository/maven-public/com/palmergames/bukkit/towny/Towny/0.96.2.16/Towny-0.96.2.16.jar"

      - name: Prepare server
        run: |
          mkdir -p server/plugins
          cp server.jar server/server.jar
          cp plugin.jar server/plugins/TeamsAPI.jar
          cp towny-extension.jar server/plugins/TeamsAPI-Towny-Extension.jar
          cp Towny.jar server/plugins/Towny.jar
          echo "eula=true" > server/eula.txt
          {
            echo "online-mode=false"
            echo "level-type=flat"
            echo "generate-structures=false"
            echo "view-distance=2"
            echo "simulation-distance=2"
          } > server/server.properties

      - name: Run Towny extension smoke test
        timeout-minutes: 6
        run: |
          cd server
          java -Xmx768M -Xms512M -jar server.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          RESULT=timeout
          FAIL_PAT="NoSuchMethodError|NoSuchFieldError|Error enabling plugin"

          for i in $(seq 1 150); do
            sleep 1
            if grep -qE "$FAIL_PAT" server.log 2>/dev/null; then
              RESULT=fail
              break
            fi
            if grep -qE "Done \([0-9.]" server.log 2>/dev/null; then
              if grep -q "Registered Towny TeamsService provider" server.log 2>/dev/null; then
                RESULT=pass
              else
                RESULT=fail
              fi
              break
            fi
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              RESULT=fail
              break
            fi
          done

          kill -9 "${SERVER_PID}" 2>/dev/null || true
          wait "${SERVER_PID}" 2>/dev/null || true

          if [ "$RESULT" = "pass" ]; then
            echo "PASS: Towny extension started and registered provider."
          else
            echo "FAIL: Towny extension startup failed."
            tail -120 server.log || true
            exit 1
          fi

      - name: Upload Towny extension server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-extension-towny
          path: server/server.log
          if-no-files-found: ignore

  smoke-extension-kingdomsx:
    name: Smoke - KingdomsX extension / Paper / Java 21
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Download TeamsAPI plugin JAR
        uses: actions/download-artifact@v4
        with:
          name: plugin-jar

      - name: Download KingdomsX extension JAR
        uses: actions/download-artifact@v4
        with:
          name: kingdomsx-extension-jar

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Download Paper ${{ env.MC_VERSION }}
        run: |
          BUILD=$(curl -sf \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['builds'][-1]['build'])")
          curl -sfLo server.jar \
            "https://api.papermc.io/v2/projects/paper/versions/${{ env.MC_VERSION }}/builds/${BUILD}/downloads/paper-${{ env.MC_VERSION }}-${BUILD}.jar"

      - name: Download KingdomsX plugin JAR
        run: |
          curl -sfLo KingdomsX.jar \
            "https://repo1.maven.org/maven2/com/github/cryptomorin/kingdoms/1.17.18.1-BETA/kingdoms-1.17.18.1-BETA.jar"

      - name: Prepare server
        run: |
          mkdir -p server/plugins
          cp server.jar server/server.jar
          cp plugin.jar server/plugins/TeamsAPI.jar
          cp kingdomsx-extension.jar server/plugins/TeamsAPI-KingdomsX-Extension.jar
          cp KingdomsX.jar server/plugins/KingdomsX.jar
          echo "eula=true" > server/eula.txt
          {
            echo "online-mode=false"
            echo "level-type=flat"
            echo "generate-structures=false"
            echo "view-distance=2"
            echo "simulation-distance=2"
          } > server/server.properties

      - name: Run KingdomsX extension smoke test
        timeout-minutes: 6
        run: |
          cd server
          java -Xmx768M -Xms512M -jar server.jar --nogui > server.log 2>&1 &
          SERVER_PID=$!
          RESULT=timeout
          FAIL_PAT="NoSuchMethodError|NoSuchFieldError|Error enabling plugin"

          for i in $(seq 1 150); do
            sleep 1
            if grep -qE "$FAIL_PAT" server.log 2>/dev/null; then
              RESULT=fail
              break
            fi
            if grep -qE "Done \([0-9.]" server.log 2>/dev/null; then
              if grep -q "Registered KingdomsX TeamsService provider" server.log 2>/dev/null; then
                RESULT=pass
              else
                RESULT=fail
              fi
              break
            fi
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              RESULT=fail
              break
            fi
          done

          kill -9 "${SERVER_PID}" 2>/dev/null || true
          wait "${SERVER_PID}" 2>/dev/null || true

          if [ "$RESULT" = "pass" ]; then
            echo "PASS: KingdomsX extension started and registered provider."
          else
            echo "FAIL: KingdomsX extension startup failed."
            tail -120 server.log || true
            exit 1
          fi

      - name: Upload KingdomsX extension server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-extension-kingdomsx
          path: server/server.log
          if-no-files-found: ignore

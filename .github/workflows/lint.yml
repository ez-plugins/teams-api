name: Lint

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - ".markdownlint.yml"

jobs:
  markdown:
    name: Validate Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint documentation Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "docs/**/*.md"
          config: ".markdownlint.yml"

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published

jobs:
  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit dev/26.1.1
        run: |
          git clone --depth=1 --branch dev/26.1.1 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Run Checkstyle
        run: mvn -B -ntp -pl teams-api checkstyle:check

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit dev/26.1.1
        run: |
          git clone --depth=1 --branch dev/26.1.1 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Compile
        run: mvn -B -ntp -DskipTests compile

      - name: Run unit tests
        run: mvn -B -ntp -pl teams-api test

      - name: Coverage report
        run: mvn -B -ntp -pl teams-api jacoco:report

  package:
    name: Package Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit dev/26.1.1
        run: |
          git clone --depth=1 --branch dev/26.1.1 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Package
        run: mvn -B -ntp -DskipTests package

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: teams-api-plugin
          path: teams-api-plugin/target/teams-api-plugin-*.jar
          if-no-files-found: error

  publish-github-packages:
    name: Publish to GitHub Packages
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and install MockBukkit dev/26.1.1
        run: |
          git clone --depth=1 --branch dev/26.1.1 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit && ./gradlew publishToMavenLocal -xtest -xjavadoc

      - name: Publish Maven artifacts
        run: mvn -B -ntp -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

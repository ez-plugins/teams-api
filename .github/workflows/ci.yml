name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published

jobs:
  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run Checkstyle
        run: mvn -B -ntp -pl teams-api checkstyle:check

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit minecraft/v26
        run: |
          git clone --depth=1 --branch minecraft/v26 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit
          VERSION="dev-$(git rev-parse --short HEAD)"
          echo "MOCKBUKKIT_VERSION=$VERSION" >> "$GITHUB_ENV"
          ./gradlew jar generatePomFileForMavenPublication -x test
          JAR=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)
          POM=$(find build/publications -name 'pom-default.xml' | head -1)
          mvn install:install-file -Dfile="$JAR" -DpomFile="$POM"

      - name: Compile
        run: mvn -B -ntp -DskipTests -Dmockbukkit.version=${MOCKBUKKIT_VERSION} compile

      - name: Run unit tests
        run: mvn -B -ntp -pl teams-api -Dmockbukkit.version=${MOCKBUKKIT_VERSION} test

      - name: Coverage report
        run: mvn -B -ntp -pl teams-api -Dmockbukkit.version=${MOCKBUKKIT_VERSION} jacoco:report

  package:
    name: Package Plugin
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and install MockBukkit minecraft/v26
        run: |
          git clone --depth=1 --branch minecraft/v26 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit
          VERSION="dev-$(git rev-parse --short HEAD)"
          echo "MOCKBUKKIT_VERSION=$VERSION" >> "$GITHUB_ENV"
          ./gradlew jar generatePomFileForMavenPublication -x test
          JAR=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)
          POM=$(find build/publications -name 'pom-default.xml' | head -1)
          mvn install:install-file -Dfile="$JAR" -DpomFile="$POM"

      - name: Package
        run: mvn -B -ntp -DskipTests -Dmockbukkit.version=${MOCKBUKKIT_VERSION} package

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: teams-api-plugin
          path: teams-api-plugin/target/teams-api-plugin-*.jar
          if-no-files-found: error

  publish-github-packages:
    name: Publish to GitHub Packages
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build and install MockBukkit minecraft/v26
        run: |
          git clone --depth=1 --branch minecraft/v26 https://github.com/MockBukkit/MockBukkit.git /tmp/MockBukkit
          cd /tmp/MockBukkit
          VERSION="dev-$(git rev-parse --short HEAD)"
          echo "MOCKBUKKIT_VERSION=$VERSION" >> "$GITHUB_ENV"
          ./gradlew jar generatePomFileForMavenPublication -x test
          JAR=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources*' ! -name '*-javadoc*' | head -1)
          POM=$(find build/publications -name 'pom-default.xml' | head -1)
          mvn install:install-file -Dfile="$JAR" -DpomFile="$POM"

      - name: Build plugin JAR
        run: mvn -B -ntp -DskipTests -Dmockbukkit.version=${MOCKBUKKIT_VERSION} package

      - name: Publish Maven artifacts
        run: mvn -B -ntp -DskipTests -pl teams-api -Dmockbukkit.version=${MOCKBUKKIT_VERSION} deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach plugin JAR to release
        uses: softprops/action-gh-release@v2
        with:
          files: teams-api-plugin/target/teams-api-plugin-*.jar

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published

jobs:
  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run Checkstyle
        run: mvn -B -ntp checkstyle:check

  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compile, test and coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: mvn -B -ntp verify

  package:
    name: Package Plugin
    runs-on: ubuntu-latest
    needs: [lint, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Package
        run: mvn -B -ntp -DskipTests package

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: teams-api-plugin
          path: teams-api-plugin/target/teams-api-plugin-*.jar
          if-no-files-found: error

      - name: Upload velocity JAR
        uses: actions/upload-artifact@v4
        with:
          name: teams-api-velocity
          path: teams-api-velocity/target/teams-api-velocity-*.jar
          if-no-files-found: error

      - name: Upload BungeeCord JAR
        uses: actions/upload-artifact@v4
        with:
          name: teams-api-bungeecord
          path: teams-api-bungeecord/target/teams-api-bungeecord-*.jar
          if-no-files-found: error
